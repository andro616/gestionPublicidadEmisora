<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Celestial Stereo 104.1 FM</title>
    <link rel="stylesheet" href="styleLogin.css">
</head>

<body>
    <div class="screen-active">
        <div class="login-box">
            <div class="logo-login">🎙 Celestial</div>
            <div class="login-text">Stereo 104.1 FM · La Radio Positiva</div>
            <h2>Ingreso al sistema</h2>
            <div id="login-error" class="alert-error" style="display:none">
                ⚠ Usuario o contraseña incorrectos.
            </div>

            <form action="index.html">
                <div class="input-group">
                    <label>Usuario</label>
                    <input type="text" id="usuario" required>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" id="password">
                </div>

                <div class="input-group">
                    <label>Rol</label>
                    <select name="user_role" id="user_role">
                        <option value="admin">Administrador</option>
                        <option value="user">Usuario estandar</option>
                    </select>
                </div>
                <button type="submit" class="btn-ingresar">Ingresar</button>
            </form>
            <div class="login-footer">
                    <p>Sistema de Gestión Publicitaria - Corporación Juan Valdez</p>
                    <p>de Santa Rosa de Cabal</p>
                </div>
        </div>
    </div>
</body>
</html>
